name: Publish Wasm to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build Wasm
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Push Wasm to GHCR
        run: |
          # The binary name from Cargo.toml is hello_wasm
          WASM_PATH=target/wasm32-unknown-unknown/release/hello_wasm.wasm
          
          # Convert image name to lowercase for OCI compliance
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          
          # Install toml parser (just in case, though we are using forge.yaml)
          pip install toml --user || true
          
          # Get tools as JSON array using yq
          TOOLS_JSON=$(yq -o json '.tools' forge.yaml 2>/dev/null || yq '.tools' forge.yaml)
          
          # Iterate over tools
          echo "$TOOLS_JSON" | jq -c '.[]' | while read -r tool; do
            NAME=$(echo "$tool" | jq -r '.name')
            DESC=$(echo "$tool" | jq -r '.description')
            ENTRY=$(echo "$tool" | jq -r '.entrypoint')
            
            # Iterate over tags generated by metadata-action (one per line)
            echo "${{ steps.meta.outputs.tags }}" | while read -r base_tag; do
              if [ -z "$base_tag" ]; then continue; fi
              
              # Extract the ref (branch or tag) after the last colon
              REF=${base_tag##*:}
              
              # Construct final tag: registry/repo:name-ref
              FINAL_TAG="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:${NAME}-${REF}"
              
              echo "Pushing tool $NAME to $FINAL_TAG..."
              oras push "$FINAL_TAG" \
                --artifact-type application/vnd.wasm.content.v1+wasm \
                --annotation "org.opencontainers.image.description=$DESC" \
                --annotation "module.wasm.entrypoint=$ENTRY" \
                "$WASM_PATH"
            done
          done
