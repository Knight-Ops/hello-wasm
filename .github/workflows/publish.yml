name: Publish Wasm to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build Wasm
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Push Wasm to GHCR
        run: |
          # The binary name from Cargo.toml is hello_wasm
          WASM_PATH=target/wasm32-unknown-unknown/release/hello_wasm.wasm
          
          # Iterate over tags generated by metadata-action (one per line)
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            if [ -z "$tag" ]; then continue; fi
            echo "Pushing to $tag..."
            oras push "$tag" \
              --artifact-type application/vnd.wasm.content.v1+wasm \
              "$WASM_PATH"
          done
